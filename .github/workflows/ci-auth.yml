name: CI — auth-service

on:
  push:
    branches: [main, develop]
    paths:
      - 'auth-service/**'
      - '.github/workflows/ci-auth.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'auth-service/**'

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hoem_test
          POSTGRES_USER: hoem
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: auth-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/hoem_test?currentSchema=auth
          SPRING_DATASOURCE_USERNAME: hoem
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: test_secret_min_32_characters_long_xx
        run: mvn verify --no-transfer-progress

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: auth-service-test-report
          path: auth-service/target/surefire-reports/
