spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://postgresql:5432/hoem?currentSchema=auth
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: auth

server:
  port: 8081

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  verification-token:
    ttl-hours: 24
  rate-limit:
    register:
      capacity: 10
      refill-minutes: 1

resend:
  api-key: ${RESEND_API_KEY}
  from-address: noreply@hoem.app

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-seconds: 3600
  refresh-token-expiry-days: 30

springdoc:
  api-docs:
    path: /actuator/docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    dev.hoem.auth: INFO
